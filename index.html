<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#4f46e5" />
<title>복습플랜 · 공부시간 & 복습 진도 체크</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="복습플랜" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
:root{
  --bg:#f5f6fb; --card:#fff; --ink:#1e2233; --muted:#6d7385; --line:#e6e8f0;
  --primary:#4f46e5; --primary-soft:#eef0fe;
  --green:#15803d; --green-soft:#e7f6ec;
  --red:#be123c; --red-soft:#fdeaef;
  --amber:#b45309; --amber-soft:#fdf2e2;
  --radius:16px; --shadow:0 4px 14px rgba(30,34,51,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.5;
  padding-bottom:calc(74px + env(safe-area-inset-bottom));
}

/* ---------- 헤더 ---------- */
.hdr{background:linear-gradient(135deg,#4f46e5,#6d5ef0);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 18px 14px}
.hdr .in{display:flex;align-items:center;gap:11px;max-width:640px;margin:0 auto}
.hdr .lg{font-size:28px}
.hdr h1{margin:0;font-size:19px;font-weight:800}
.hdr p{margin:1px 0 0;font-size:12px;opacity:.85}

/* ---------- 하단 탭 ---------- */
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);
  display:flex;max-width:640px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.tabs button{flex:1;border:0;background:none;padding:10px 2px 8px;cursor:pointer;color:var(--muted);font-weight:700;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px}
.tabs button .ic{font-size:20px}
.tabs button.on{color:var(--primary)}

main{max-width:640px;margin:0 auto;padding:16px}
.view{display:none}
.view.on{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.stitle{font-size:15px;font-weight:800;margin:20px 0 10px}
.card .stitle:first-child{margin-top:0}
.list{display:flex;flex-direction:column;gap:10px}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:20px 8px}

/* ---------- 홈 ---------- */
.today{color:var(--muted);font-size:13px;font-weight:700;margin:0 0 12px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:var(--primary-soft);border-radius:12px;padding:14px;text-align:center}
.tile b{display:block;font-size:26px;font-weight:800;color:var(--primary);font-variant-numeric:tabular-nums}
.tile span{font-size:12px;color:var(--muted)}

.item{background:var(--card);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.item .m{flex:1;min-width:0}
.item .t{font-weight:700;font-size:14px}
.item .s{font-size:12px;color:var(--muted);margin-top:1px}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap}
.b-pri{background:var(--primary-soft);color:var(--primary)}
.b-amb{background:var(--amber-soft);color:var(--amber)}
.b-red{background:var(--red-soft);color:var(--red)}
.b-grn{background:var(--green-soft);color:var(--green)}

/* ---------- 버튼 ---------- */
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:11px 16px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.ghost{background:transparent}
.btn.blk{width:100%;margin-bottom:14px}
.btn.warn{color:var(--red);border-color:#f6c6d2}
.btn.sm{padding:8px 14px;font-size:13px}
.btn:disabled{opacity:.4;cursor:default}

/* ---------- 복습 ---------- */
.chips{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

.lesson{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.lesson+.lesson{margin-top:10px}
.lhead{display:flex;align-items:flex-start;gap:10px}
.lhead .m{flex:1;min-width:0}
.lnote{font-size:12px;color:var(--muted);margin-top:6px;font-style:italic}
.track{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.rev{border:1px solid var(--line);border-radius:10px;padding:7px 9px;font-size:11px;text-align:center;cursor:pointer;background:#fff;min-width:56px;user-select:none;font-family:inherit}
.rev b{display:block;font-weight:800}
.rev i{font-style:normal;color:var(--muted)}
.rev.done{background:var(--green-soft);border-color:#bfe6cb;color:var(--green)}
.rev.done i{color:var(--green)}
.rev.due{background:var(--amber-soft);border-color:#f3d8a8;color:var(--amber)}
.rev.due i{color:var(--amber)}
.rev.over{background:var(--red-soft);border-color:#f6c6d2;color:var(--red)}
.rev.over i{color:var(--red)}
.pbar{height:6px;background:var(--line);border-radius:999px;margin-top:12px;overflow:hidden}
.pbar>i{display:block;height:100%;background:var(--green);border-radius:999px;transition:width .3s}
.lfoot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.lfoot small{color:var(--muted);font-size:11px}
.del{color:var(--red);font-size:12px;background:none;border:0;cursor:pointer;padding:4px;font-family:inherit;font-weight:700}

/* ---------- 타이머 ---------- */
.tmr{text-align:center}
.sel{width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:#fff;font-family:inherit;margin-bottom:6px}
.tdisp{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;margin:16px 0;color:var(--primary)}
.tbtns{display:flex;gap:10px}
.tbtns .btn{flex:1}
.thint{font-size:12px;color:var(--muted);margin:14px 0 0}

/* ---------- 통계: 주간 차트 ---------- */
.chart{padding-top:26px}
.cplot{display:flex;align-items:flex-end;gap:8px;height:130px;border-bottom:1px solid var(--line)}
.ccol{flex:1;position:relative;display:flex;align-items:flex-end;justify-content:center;height:100%;cursor:pointer;background:none;border:0;padding:0;font-family:inherit}
.cbar{width:62%;background:var(--primary);border-radius:4px 4px 0 0;min-height:2px}
.ccol.zero .cbar{background:var(--line)}
.cval{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;color:var(--ink);background:var(--card);padding:1px 6px;border-radius:6px;box-shadow:var(--shadow);white-space:nowrap;display:none}
.ccol.show .cval,.ccol.today .cval{display:block}
.clbls{display:flex;gap:8px;margin-top:6px}
.clbls span{flex:1;text-align:center;font-size:11px;color:var(--muted)}
.clbls span.today{color:var(--primary);font-weight:800}
.chint{font-size:11px;color:var(--muted);text-align:center;margin:10px 0 0}

/* ---------- 모달: 기본은 무조건 숨김, .open일 때만 표시 ---------- */
.modal{display:none}
.modal.open{display:flex;position:fixed;inset:0;z-index:50;background:rgba(20,22,34,.45);align-items:flex-end;justify-content:center}
.sheet{background:#fff;width:100%;max-width:640px;border-radius:20px 20px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));animation:up .2s ease}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheet h3{margin:0 0 16px;font-size:17px}
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fld>span{font-size:12px;font-weight:700;color:var(--muted)}
.fld input,.fld textarea{border:1px solid var(--line);border-radius:11px;padding:11px;font-size:15px;font-family:inherit;background:#fff;width:100%}
.fld input:focus,.fld textarea:focus,.sel:focus{outline:2px solid var(--primary-soft);border-color:var(--primary)}
.frow{display:flex;gap:10px}
.frow .fld{flex:1;min-width:0}
.pv{font-size:12px;color:var(--primary);background:var(--primary-soft);padding:10px 12px;border-radius:10px;margin:2px 0 14px}
.pv:empty{display:none}
.macts{display:flex;gap:10px}
.macts .btn{flex:1}

/* ---------- 토스트 ---------- */
#toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;animation:fade .2s ease;max-width:86vw;text-align:center}
#toast.show{display:block}
</style>
</head>
<body>

<header class="hdr">
  <div class="in">
    <span class="lg">📚</span>
    <div><h1>복습플랜</h1><p>공부시간 체크 · 시험 전 똑똑한 복습</p></div>
  </div>
</header>

<main>
  <!-- 홈 -->
  <section class="view on" id="v-home">
    <div class="card">
      <p class="today" id="todayLabel"></p>
      <div class="tiles">
        <div class="tile"><b id="tReviews">0</b><span>오늘 복습할 항목</span></div>
        <div class="tile"><b id="tStudy">0분</b><span>오늘 공부시간</span></div>
      </div>
    </div>
    <h2 class="stitle">📌 오늘 복습할 내용</h2>
    <div class="list" id="homeReviews"></div>
    <h2 class="stitle">⏰ 다가오는 시험</h2>
    <div class="list" id="homeExams"></div>
  </section>

  <!-- 복습 -->
  <section class="view" id="v-review">
    <button class="btn pri blk" id="btnAddLesson">＋ 수업 내용 추가</button>
    <div class="chips" id="chips">
      <button class="chip on" data-f="all">전체</button>
      <button class="chip" data-f="today">오늘</button>
      <button class="chip" data-f="overdue">밀린 복습</button>
      <button class="chip" data-f="done">완료</button>
    </div>
    <div id="lessons"></div>
  </section>

  <!-- 타이머 -->
  <section class="view" id="v-timer">
    <div class="card tmr">
      <select class="sel" id="subSel"></select>
      <div class="tdisp" id="tdisp">00:00:00</div>
      <div class="tbtns">
        <button class="btn pri" id="btnStart">시작</button>
        <button class="btn" id="btnPause" disabled>일시정지</button>
        <button class="btn ghost" id="btnSave" disabled>저장</button>
      </div>
      <p class="thint">과목을 고르고 공부를 시작하세요. ‘저장’을 누르면 오늘 기록에 더해져요.</p>
    </div>
    <h2 class="stitle">오늘 공부 기록</h2>
    <div class="list" id="todayLogs"></div>
    <button class="btn ghost blk" id="btnManual" style="margin-top:14px">＋ 직접 시간 입력</button>
  </section>

  <!-- 통계 -->
  <section class="view" id="v-stats">
    <div class="card">
      <h2 class="stitle">최근 7일 공부시간 (분)</h2>
      <div class="chart">
        <div class="cplot" id="cplot"></div>
        <div class="clbls" id="clbls"></div>
      </div>
      <p class="chint">막대를 누르면 그날의 공부시간이 보여요</p>
    </div>
    <div class="card">
      <h2 class="stitle">과목별 누적 공부시간</h2>
      <div class="list" id="subTotals"></div>
    </div>
    <div class="card">
      <h2 class="stitle">복습 진행률</h2>
      <div class="list" id="revProgress"></div>
    </div>
    <button class="btn ghost blk warn" id="btnReset">⚠️ 모든 데이터 초기화</button>
  </section>
</main>

<nav class="tabs" id="tabs">
  <button class="on" data-v="home"><span class="ic">🏠</span>홈</button>
  <button data-v="review"><span class="ic">🔁</span>복습</button>
  <button data-v="timer"><span class="ic">⏱️</span>타이머</button>
  <button data-v="stats"><span class="ic">📊</span>통계</button>
</nav>

<!-- 수업 추가 모달 -->
<div class="modal" id="mLesson">
  <div class="sheet">
    <h3>수업 내용 추가</h3>
    <label class="fld"><span>과목</span>
      <input id="fSub" list="subList" placeholder="예: 수학, 영어, 한국사" /><datalist id="subList"></datalist>
    </label>
    <label class="fld"><span>단원 / 배운 내용</span>
      <input id="fTopic" placeholder="예: 미적분 - 극한, 1단원 어법" />
    </label>
    <label class="fld"><span>메모 (선택)</span>
      <textarea id="fNote" rows="2" placeholder="헷갈리는 부분, 외울 공식 등"></textarea>
    </label>
    <div class="frow">
      <label class="fld"><span>수업한 날</span><input type="date" id="fClass" /></label>
      <label class="fld"><span>시험 날</span><input type="date" id="fExam" /></label>
    </div>
    <p class="pv" id="fPreview"></p>
    <div class="macts">
      <button class="btn ghost" data-close="mLesson">취소</button>
      <button class="btn pri" id="fSave">저장</button>
    </div>
  </div>
</div>

<!-- 직접 입력 모달 -->
<div class="modal" id="mLog">
  <div class="sheet">
    <h3>공부시간 직접 입력</h3>
    <label class="fld"><span>과목</span><input id="lSub" list="subList" placeholder="과목명" /></label>
    <label class="fld"><span>시간 (분)</span><input id="lMin" type="number" min="1" placeholder="예: 50" /></label>
    <div class="macts">
      <button class="btn ghost" data-close="mLog">취소</button>
      <button class="btn pri" id="lSave">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
/* ============================================================
   복습플랜 v2 — 단일 파일. localStorage 저장.
   ============================================================ */
var STORE = 'review-plan-v1'; // 기존 데이터와 호환

function load(){
  try{
    var raw = localStorage.getItem(STORE);
    if(!raw) return {lessons:[],logs:[]};
    var p = JSON.parse(raw);
    return {lessons:p.lessons||[],logs:p.logs||[]};
  }catch(e){ return {lessons:[],logs:[]}; }
}
var data = load();
function save(){ localStorage.setItem(STORE, JSON.stringify(data)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ---------- 날짜 ---------- */
var DAY = 86400000;
function toISO(d){
  var x = new Date(d); x.setHours(0,0,0,0);
  return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');
}
function todayStr(){ return toISO(new Date()); }
function parseISO(s){ var a=s.split('-'); return new Date(+a[0],+a[1]-1,+a[2]); }
function daysBetween(a,b){ return Math.round((parseISO(b)-parseISO(a))/DAY); }
function addDays(iso,n){ return toISO(parseISO(iso).getTime()+n*DAY); }
var WD = ['일','월','화','수','목','금','토'];
function fmtK(iso){ var d=parseISO(iso); return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WD[d.getDay()]+')'; }
function fmtMD(iso){ var d=parseISO(iso); return (d.getMonth()+1)+'/'+d.getDate(); }

/* ---------- 복습 일정 (망각곡선 간격 반복) ---------- */
function buildSchedule(classDate, examDate){
  var total = daysBetween(classDate, examDate);
  if(total <= 0) return [{date:classDate, done:false}];
  var dates = [];
  [1,3,7,14,30].forEach(function(iv){ if(iv < total) dates.push(addDays(classDate,iv)); });
  var last = total >= 2 ? addDays(examDate,-1) : examDate;
  if(dates.length === 0) dates.push(addDays(classDate, Math.max(1, Math.floor(total/2))));
  var set = {};
  dates.forEach(function(d){ if(daysBetween(d,examDate) >= 0) set[d]=1; });
  set[last]=1;
  return Object.keys(set).sort().map(function(d){ return {date:d, done:false}; });
}
function revState(r){
  if(r.done) return 'done';
  var diff = daysBetween(todayStr(), r.date);
  if(diff < 0) return 'over';
  if(diff === 0) return 'due';
  return 'up';
}

/* ---------- 헬퍼 ---------- */
function $(s){ return document.querySelector(s); }
function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function em(t){ return '<div class="empty">'+t+'</div>'; }
function fmtDur(sec){
  var h=Math.floor(sec/3600), m=Math.round((sec%3600)/60);
  return h>0 ? h+'시간 '+m+'분' : m+'분';
}
function subjects(){
  var s={};
  data.lessons.forEach(function(l){ if(l.subject) s[l.subject]=1; });
  data.logs.forEach(function(l){ if(l.subject) s[l.subject]=1; });
  return Object.keys(s);
}
function studySecOn(iso){
  return data.logs.reduce(function(a,l){ return l.date===iso ? a+l.seconds : a; },0);
}
var toastTimer=null;
function toast(msg){
  var el=$('#toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ el.classList.remove('show'); },1900);
}

/* ============================================================
   렌더링
   ============================================================ */
function renderAll(){
  renderHome(); renderLessons(); renderSubSel(); renderTodayLogs(); renderStats(); renderSubList();
}

function renderHome(){
  $('#todayLabel').textContent = fmtK(todayStr())+' · 오늘도 화이팅! 🔥';
  var due=[];
  data.lessons.forEach(function(les){
    les.reviews.forEach(function(r,i){
      var st=revState(r);
      if(st==='due'||st==='over') due.push({les:les,i:i,st:st,r:r});
    });
  });
  $('#tReviews').textContent = due.length;
  $('#tStudy').textContent = Math.round(studySecOn(todayStr())/60)+'분';

  due.sort(function(a,b){ return a.st==='over'&&b.st!=='over' ? -1 : a.st!=='over'&&b.st==='over' ? 1 : 0; });
  $('#homeReviews').innerHTML = due.length ? due.map(function(d){
    return '<div class="item">'+
      '<div class="m"><div class="t">'+esc(d.les.subject)+' · '+esc(d.les.topic)+'</div>'+
      '<div class="s">'+(d.st==='over' ? '⚠️ '+Math.abs(daysBetween(todayStr(),d.r.date))+'일 밀림' : '오늘 복습 차례')+'</div></div>'+
      '<button class="btn pri sm" data-act="done" data-id="'+d.les.id+'" data-i="'+d.i+'">완료</button></div>';
  }).join('') : em('오늘 밀린 복습이 없어요. 완벽해요! ✨');

  var seen={}, exams=[];
  data.lessons.forEach(function(l){
    if(daysBetween(todayStr(),l.examDate) < 0) return;
    var k=l.subject+'|'+l.examDate;
    if(!seen[k]){ seen[k]=1; exams.push(l); }
  });
  exams.sort(function(a,b){ return parseISO(a.examDate)-parseISO(b.examDate); });
  $('#homeExams').innerHTML = exams.length ? exams.slice(0,5).map(function(l){
    var d=daysBetween(todayStr(),l.examDate);
    return '<div class="item"><div class="m"><div class="t">'+esc(l.subject)+' 시험</div>'+
      '<div class="s">'+fmtK(l.examDate)+'</div></div>'+
      '<span class="badge '+(d<=3?'b-red':'b-amb')+'">D-'+(d===0?'DAY':d)+'</span></div>';
  }).join('') : em('등록된 시험이 없어요. 복습 탭에서 추가해 보세요.');
}

var filter='all';
function renderLessons(){
  var list = data.lessons.filter(function(l){
    if(filter==='today') return l.reviews.some(function(r){ return revState(r)==='due'; });
    if(filter==='overdue') return l.reviews.some(function(r){ return revState(r)==='over'; });
    if(filter==='done') return l.reviews.every(function(r){ return r.done; });
    return true;
  });
  list.sort(function(a,b){ return parseISO(a.examDate)-parseISO(b.examDate); });

  $('#lessons').innerHTML = list.length ? list.map(function(les){
    var done=les.reviews.filter(function(r){return r.done;}).length;
    var pct=Math.round(done/les.reviews.length*100);
    var d=daysBetween(todayStr(),les.examDate);
    var track=les.reviews.map(function(r,i){
      var st=revState(r);
      var cls=r.done?'done':st==='due'?'due':st==='over'?'over':'';
      return '<button class="rev '+cls+'" data-act="toggle" data-id="'+les.id+'" data-i="'+i+'">'+
        '<b>'+(r.done?'✓':(i+1)+'차')+'</b><i>'+fmtMD(r.date)+'</i></button>';
    }).join('');
    return '<div class="lesson">'+
      '<div class="lhead"><div class="m">'+
        '<div class="t">'+esc(les.topic)+'</div>'+
        '<div class="s">'+esc(les.subject)+' · 시험 '+fmtK(les.examDate)+' ('+(d<0?'종료':'D-'+(d===0?'DAY':d))+')</div>'+
      '</div><span class="badge '+(pct===100?'b-grn':'b-pri')+'">'+done+'/'+les.reviews.length+'</span></div>'+
      (les.note?'<div class="lnote">📝 '+esc(les.note)+'</div>':'')+
      '<div class="track">'+track+'</div>'+
      '<div class="pbar"><i style="width:'+pct+'%"></i></div>'+
      '<div class="lfoot"><small>복습 진행률 '+pct+'%</small>'+
      '<button class="del" data-act="del" data-id="'+les.id+'">삭제</button></div></div>';
  }).join('') : em('해당하는 수업 내용이 없어요.');
}

function renderSubSel(){
  var sel=$('#subSel'), cur=sel.value, subs=subjects();
  if(subs.length===0) subs=['공부'];
  sel.innerHTML = subs.map(function(s){ return '<option value="'+esc(s)+'">'+esc(s)+'</option>'; }).join('')
    + '<option value="__etc">+ 기타 직접입력</option>';
  if(cur){ sel.value=cur; if(sel.selectedIndex<0) sel.selectedIndex=0; }
}
function renderSubList(){
  $('#subList').innerHTML = subjects().map(function(s){ return '<option value="'+esc(s)+'">'; }).join('');
}

function renderTodayLogs(){
  var t=todayStr(), by={};
  data.logs.forEach(function(l){ if(l.date===t) by[l.subject]=(by[l.subject]||0)+l.seconds; });
  var ents=Object.keys(by).map(function(k){ return [k,by[k]]; }).sort(function(a,b){ return b[1]-a[1]; });
  var total=ents.reduce(function(a,e){ return a+e[1]; },0);
  $('#todayLogs').innerHTML = ents.length ? ents.map(function(e){
    return '<div class="item"><div class="m"><div class="t">'+esc(e[0])+'</div></div>'+
      '<span class="badge b-pri">'+fmtDur(e[1])+'</span></div>';
  }).join('')+'<div class="item" style="background:var(--primary-soft)"><div class="m"><div class="t">오늘 합계</div></div>'+
    '<span class="badge b-pri">'+fmtDur(total)+'</span></div>'
  : em('오늘 기록이 아직 없어요. 타이머를 시작해 보세요!');
}

function renderStats(){
  /* 주간 차트: 단일 시리즈, 오늘 막대만 직접 라벨, 나머지는 탭하면 표시 */
  var days=[], i;
  for(i=6;i>=0;i--) days.push(addDays(todayStr(),-i));
  var vals=days.map(function(d){ return Math.round(studySecOn(d)/60); });
  var max=Math.max(60, Math.max.apply(null,vals));
  $('#cplot').innerHTML = days.map(function(d,idx){
    var h=Math.round(vals[idx]/max*100);
    var isToday = d===todayStr();
    return '<button class="ccol'+(isToday?' today':'')+(vals[idx]===0?' zero':'')+'" data-act="bar">'+
      '<span class="cval">'+vals[idx]+'분</span>'+
      '<span class="cbar" style="height:'+h+'%"></span></button>';
  }).join('');
  $('#clbls').innerHTML = days.map(function(d){
    return '<span'+(d===todayStr()?' class="today"':'')+'>'+WD[parseISO(d).getDay()]+'</span>';
  }).join('');

  var by={};
  data.logs.forEach(function(l){ by[l.subject]=(by[l.subject]||0)+l.seconds; });
  var ents=Object.keys(by).map(function(k){ return [k,by[k]]; }).sort(function(a,b){ return b[1]-a[1]; });
  $('#subTotals').innerHTML = ents.length ? ents.map(function(e){
    return '<div class="item"><div class="m"><div class="t">'+esc(e[0])+'</div></div>'+
      '<span class="badge b-pri">'+fmtDur(e[1])+'</span></div>';
  }).join('') : em('아직 공부 기록이 없어요.');

  $('#revProgress').innerHTML = data.lessons.length ? data.lessons.map(function(l){
    var done=l.reviews.filter(function(r){return r.done;}).length;
    var pct=Math.round(done/l.reviews.length*100);
    return '<div class="item"><div class="m"><div class="t">'+esc(l.subject)+' · '+esc(l.topic)+'</div>'+
      '<div class="pbar" style="margin-top:8px"><i style="width:'+pct+'%"></i></div></div>'+
      '<span class="badge '+(pct===100?'b-grn':'b-pri')+'">'+pct+'%</span></div>';
  }).join('') : em('등록된 복습이 없어요.');
}

/* ============================================================
   이벤트 (전부 위임 방식 — inline onclick 없음)
   ============================================================ */
document.addEventListener('click', function(e){
  var el = e.target.closest('[data-act],[data-close],[data-v],[data-f]');
  if(!el) return;

  if(el.dataset.close){ closeModal(el.dataset.close); return; }

  if(el.dataset.v){ // 탭 전환
    document.querySelectorAll('#tabs button').forEach(function(b){ b.classList.toggle('on', b===el); });
    document.querySelectorAll('.view').forEach(function(v){ v.classList.toggle('on', v.id==='v-'+el.dataset.v); });
    return;
  }
  if(el.dataset.f){ // 필터
    document.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('on', c===el); });
    filter = el.dataset.f; renderLessons(); return;
  }

  var act=el.dataset.act, les;
  if(act==='done' || act==='toggle'){
    les = data.lessons.find(function(l){ return l.id===el.dataset.id; });
    if(!les) return;
    var r = les.reviews[+el.dataset.i];
    if(act==='done'){ r.done=true; toast('복습 완료! 잘했어요 👏'); }
    else r.done=!r.done;
    save(); renderAll();
  } else if(act==='del'){
    if(!confirm('이 수업 내용을 삭제할까요?')) return;
    data.lessons = data.lessons.filter(function(l){ return l.id!==el.dataset.id; });
    save(); toast('삭제했어요'); renderAll();
  } else if(act==='bar'){
    el.classList.toggle('show');
  }
});

/* ---------- 모달 ---------- */
function openModal(id){ $('#'+id).classList.add('open'); }
function closeModal(id){ $('#'+id).classList.remove('open'); }
document.querySelectorAll('.modal').forEach(function(m){
  m.addEventListener('click', function(e){ if(e.target===m) m.classList.remove('open'); });
});

/* ---------- 수업 추가 ---------- */
$('#btnAddLesson').addEventListener('click', function(){
  $('#fSub').value=''; $('#fTopic').value=''; $('#fNote').value='';
  $('#fClass').value=todayStr(); $('#fExam').value=addDays(todayStr(),14);
  preview(); openModal('mLesson');
});
function preview(){
  var c=$('#fClass').value, ex=$('#fExam').value, p=$('#fPreview');
  if(!c||!ex){ p.textContent=''; return; }
  if(daysBetween(c,ex)<0){ p.textContent='⚠️ 시험일이 수업일보다 빠릅니다.'; return; }
  var sch=buildSchedule(c,ex);
  p.textContent='🔁 시험 전까지 총 '+sch.length+'번 복습 추천 → '+sch.map(function(r){return fmtMD(r.date);}).join(', ');
}
$('#fClass').addEventListener('change', preview);
$('#fExam').addEventListener('change', preview);

$('#fSave').addEventListener('click', function(){
  var sub=$('#fSub').value.trim(), topic=$('#fTopic').value.trim(), note=$('#fNote').value.trim();
  var c=$('#fClass').value, ex=$('#fExam').value;
  if(!sub) return toast('과목을 입력해 주세요');
  if(!topic) return toast('배운 내용을 입력해 주세요');
  if(!c||!ex) return toast('날짜를 입력해 주세요');
  if(daysBetween(c,ex)<0) return toast('시험일을 수업일 이후로 설정해 주세요');
  data.lessons.push({id:uid(),subject:sub,topic:topic,note:note,classDate:c,examDate:ex,reviews:buildSchedule(c,ex),createdAt:Date.now()});
  save(); closeModal('mLesson'); toast('복습 일정을 만들었어요 ✅'); renderAll();
});

/* ---------- 타이머 (시간 기준 계산 — 화면 꺼져도 정확) ---------- */
var acc=0, startedAt=null, tick=null;
function elapsed(){ return acc + (startedAt ? Math.floor((Date.now()-startedAt)/1000) : 0); }
function paintTimer(){
  var s=elapsed();
  $('#tdisp').textContent =
    String(Math.floor(s/3600)).padStart(2,'0')+':'+
    String(Math.floor(s%3600/60)).padStart(2,'0')+':'+
    String(s%60).padStart(2,'0');
}
function timerBtns(){
  $('#btnStart').disabled = !!startedAt;
  $('#btnPause').disabled = !startedAt;
  $('#btnSave').disabled = elapsed()===0;
}
$('#btnStart').addEventListener('click', function(){
  if(startedAt) return;
  startedAt=Date.now();
  tick=setInterval(function(){ paintTimer(); timerBtns(); },1000);
  timerBtns();
});
$('#btnPause').addEventListener('click', function(){
  if(!startedAt) return;
  acc=elapsed(); startedAt=null; clearInterval(tick);
  paintTimer(); timerBtns();
});
$('#btnSave').addEventListener('click', function(){
  var s=elapsed();
  if(s<1) return;
  acc=s; startedAt=null; clearInterval(tick);
  var sub=$('#subSel').value;
  if(sub==='__etc'){
    sub=(prompt('과목명을 입력하세요')||'').trim();
    if(!sub){ timerBtns(); return; }
  }
  data.logs.push({id:uid(),subject:sub,seconds:s,date:todayStr(),ts:Date.now()});
  save(); toast(fmtDur(s)+' 기록 완료! 📈');
  acc=0; paintTimer(); timerBtns(); renderAll();
});

/* ---------- 직접 입력 ---------- */
$('#btnManual').addEventListener('click', function(){
  $('#lSub').value=''; $('#lMin').value=''; openModal('mLog');
});
$('#lSave').addEventListener('click', function(){
  var sub=$('#lSub').value.trim(), min=parseInt($('#lMin').value,10);
  if(!sub) return toast('과목을 입력해 주세요');
  if(!min||min<1) return toast('시간(분)을 입력해 주세요');
  data.logs.push({id:uid(),subject:sub,seconds:min*60,date:todayStr(),ts:Date.now()});
  save(); closeModal('mLog'); toast(min+'분 기록했어요'); renderAll();
});

/* ---------- 초기화 ---------- */
$('#btnReset').addEventListener('click', function(){
  if(!confirm('모든 복습 일정과 공부 기록이 삭제됩니다. 계속할까요?')) return;
  data={lessons:[],logs:[]}; save(); toast('초기화했어요'); renderAll();
});

/* ---------- 시작 ---------- */
paintTimer(); timerBtns(); renderAll();
</script>
